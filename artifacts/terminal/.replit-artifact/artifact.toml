kind = "web"
previewPath = "/"
title = "Apex Meme Trader"
version = "1.0.0"
id = "artifacts/terminal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25245

[services.development]
run = "pnpm --filter @workspace/terminal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/terminal", "run", "build" ]
publicDir = "artifacts/terminal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25245"
BASE_PATH = "/"
