<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1f14"/>
      <stop offset="100%" stop-color="#060d0a"/>
    </radialGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer scope ring -->
  <circle cx="256" cy="256" r="210" stroke="url(#g1)" stroke-width="6" stroke-opacity="0.9" filter="url(#glow)"/>

  <!-- Middle ring -->
  <circle cx="256" cy="256" r="155" stroke="url(#g1)" stroke-width="3" stroke-opacity="0.6" stroke-dasharray="12 8"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="90" stroke="url(#g1)" stroke-width="3" stroke-opacity="0.8"/>

  <!-- Centre dot glow -->
  <circle cx="256" cy="256" r="28" fill="#10b981" fill-opacity="0.18" filter="url(#softglow)"/>
  <circle cx="256" cy="256" r="14" fill="url(#g1)" filter="url(#glow)"/>

  <!-- Crosshair — top -->
  <line x1="256" y1="32"  x2="256" y2="150" stroke="url(#g1)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Crosshair — bottom -->
  <line x1="256" y1="362" x2="256" y2="480" stroke="url(#g1)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Crosshair — left -->
  <line x1="32"  y1="256" x2="150" y2="256" stroke="url(#g1)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Crosshair — right -->
  <line x1="362" y1="256" x2="480" y2="256" stroke="url(#g1)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Tick marks on outer ring -->
  <line x1="256" y1="46"  x2="256" y2="70"  stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="256" y1="442" x2="256" y2="466" stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="46"  y1="256" x2="70"  y2="256" stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="442" y1="256" x2="466" y2="256" stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-opacity="0.5"/>
</svg>
