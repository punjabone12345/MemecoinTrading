<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0020"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="glow2" x1="256" y1="160" x2="256" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="60%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="solGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#9945ff"/>
      <stop offset="100%" stop-color="#14f195"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle center glow -->
  <ellipse cx="256" cy="256" rx="190" ry="190" fill="#7c3aed" fill-opacity="0.08"/>

  <!-- Hexagon outer ring (Solana-inspired) -->
  <polygon points="256,48 436,152 436,360 256,464 76,360 76,152"
    fill="none" stroke="url(#glow1)" stroke-width="2" stroke-opacity="0.30"/>

  <!-- Solana gradient accent bar -->
  <rect x="88" y="392" width="336" height="8" rx="4" fill="url(#solGrad)" opacity="0.75"/>

  <!-- Rising chart bars (background layer) -->
  <rect x="96"  y="292" width="38" height="74"  rx="7" fill="#34d399" fill-opacity="0.45"/>
  <rect x="148" y="258" width="38" height="108" rx="7" fill="#34d399" fill-opacity="0.55"/>
  <rect x="200" y="216" width="38" height="150" rx="7" fill="#34d399" fill-opacity="0.65"/>
  <rect x="252" y="176" width="38" height="190" rx="7" fill="#34d399" fill-opacity="0.75"/>
  <rect x="304" y="140" width="38" height="226" rx="7" fill="#a3e635" fill-opacity="0.80"/>

  <!-- Rocket spike on last bar -->
  <g filter="url(#softglow)">
    <polygon points="323,92 308,140 338,140" fill="#fde047" fill-opacity="0.95"/>
    <rect x="319" y="75" width="8" height="22" rx="3" fill="#fde047"/>
    <!-- Rocket exhaust flames -->
    <ellipse cx="323" cy="148" rx="6" ry="4" fill="#f97316" fill-opacity="0.7"/>
  </g>

  <!-- "A" lettermark — bold violet -->
  <g filter="url(#glow)">
    <path d="M195 360 L256 162 L317 360" stroke="url(#glow2)" stroke-width="26"
      stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="217" y1="300" x2="295" y2="300" stroke="url(#glow2)" stroke-width="20" stroke-linecap="round"/>
  </g>

  <!-- Glowing vertex dots on the "A" -->
  <circle cx="256" cy="162" r="9"  fill="#c084fc" filter="url(#glow)"/>
  <circle cx="195" cy="360" r="7"  fill="#a855f7" filter="url(#glow)"/>
  <circle cx="317" cy="360" r="7"  fill="#a855f7" filter="url(#glow)"/>
  <circle cx="217" cy="300" r="5"  fill="#7c3aed"/>
  <circle cx="295" cy="300" r="5"  fill="#7c3aed"/>

  <!-- AI sparkle dots in corners -->
  <circle cx="132" cy="118" r="4.5" fill="#c084fc" fill-opacity="0.65"/>
  <circle cx="380" cy="118" r="4.5" fill="#14f195" fill-opacity="0.65"/>
  <circle cx="430" cy="272" r="3.5" fill="#9945ff" fill-opacity="0.55"/>
  <circle cx="82"  cy="272" r="3.5" fill="#9945ff" fill-opacity="0.55"/>
</svg>
